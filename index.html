<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benzene Formation Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animation-container">
        <div class="text-overlay">
            <h1 id="stage-title">3C₂H₂ (Ethyne)</h1>
            <p id="stage-desc">Three isolated ethyne molecules approach.</p>
        </div>

        <svg id="reaction-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="neon-cyan" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="neon-pink" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <filter id="neon-green" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                
                <radialGradient id="heat" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
                </radialGradient>
            </defs>

            <circle id="heat-bg" cx="250" cy="250" r="220" fill="url(#heat)" class="hidden" />

            <g transform="rotate(0, 250, 250)">
                <g class="molecule-slider far-apart">
                    <line class="pi-bond outer-pi" x1="369" y1="190" x2="369" y2="310" />
                    <line class="sigma-bond" x1="354" y1="190" x2="354" y2="310" />
                    <line class="pi-bond inner-pi" x1="339" y1="190" x2="339" y2="310" />
                </g>
            </g>

            <g transform="rotate(120, 250, 250)">
                <g class="molecule-slider far-apart">
                    <line class="pi-bond outer-pi" x1="369" y1="190" x2="369" y2="310" />
                    <line class="sigma-bond" x1="354" y1="190" x2="354" y2="310" />
                    <line class="pi-bond inner-pi" x1="339" y1="190" x2="339" y2="310" />
                </g>
            </g>

            <g transform="rotate(240, 250, 250)">
                <g class="molecule-slider far-apart">
                    <line class="pi-bond outer-pi" x1="369" y1="190" x2="369" y2="310" />
                    <line class="sigma-bond" x1="354" y1="190" x2="354" y2="310" />
                    <line class="pi-bond inner-pi" x1="339" y1="190" x2="339" y2="310" />
                </g>
            </g>

            <g id="new-bonds" class="hidden">
                <line class="sigma-bond" x1="354" y1="310" x2="250" y2="370" />
                <line class="sigma-bond" x1="146" y1="310" x2="146" y2="190" />
                <line class="sigma-bond" x1="250" y1="130" x2="354" y2="190" />
            </g>

            <circle id="resonance-ring" class="hidden" cx="250" cy="250" r="80" />
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
