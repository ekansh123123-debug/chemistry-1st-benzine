<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benzene Delocalization Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animation-container">
        <div class="text-overlay">
            <h1 id="stage-title">Forming Sigma Skeleton...</h1>
            <p id="stage-desc">Carbon atoms bond to form the basic hexagonal shape.</p>
        </div>

        <svg id="benzene-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <polygon id="sigma-bonds" points="200,60 321.2,130 321.2,270 200,340 78.8,270 78.8,130" />
            
            <g id="kekule-a" class="pi-bonds">
                <line x1="200" y1="95" x2="291" y2="147.5" />
                <line x1="291" y1="252.5" x2="200" y2="305" />
                <line x1="109" y1="252.5" x2="109" y2="147.5" />
            </g>

            <g id="kekule-b" class="pi-bonds">
                <line x1="291" y1="147.5" x2="291" y2="252.5" />
                <line x1="200" y1="305" x2="109" y2="252.5" />
                <line x1="109" y1="147.5" x2="200" y2="95" />
            </g>

            <circle id="resonance-ring" cx="200" cy="200" r="95" />
        </svg>
    </div>

    <script src="script.js"></script>
</body>
</html>
